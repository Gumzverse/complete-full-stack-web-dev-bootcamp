<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media Query</title>
    <style>
      #showcase {
        background-color: rebeccapurple;
        height: 500px;
        width: 500px;
      }
      #japan-flag {
        background-color: rgba(255, 255, 255, 0.584);
        height: 300px;
        width: 500px;
        border: black solid 1px;
        position: relative;
      }
      #trial-2 {
        background-color: red;
        height: 140px;
        width: 140px;
        border-radius: 50%;
        position: absolute;
        top: 80px;
        left: 180px;
      }
      #japan {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 25px;
        font-weight: 600;
        color: white;
        margin: 0;
        padding: 0;
        position: absolute;
        top: 137.5px;
        left: 43%;
        z-index: 1;
      }

      @media (max-width: 600px) {
        /* CSS for screens below or equal to 600px wide */
        #showcase {
          height: 200px;
          width: 200px;
        }
      }
    </style>
  </head>

  <body>
    <h1>Media Query</h1>
    <div id="showcase"></div>
    <br />
    <!-- Japan Flag -->
    <div id="japan-flag">
      <p id="japan">Japan</p>
      <div id="trial-2"></div>
    </div>
  </body>
</html>
